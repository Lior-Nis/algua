name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Test
        run: uv run pytest -q
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy algua
      - name: Import boundaries
        run: uv run lint-imports
